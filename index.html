<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RPG Maker Emulator</title>
    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RPG Emulator">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer" class="active">
        <div class="glass-panel">
            <div class="header">
                <div class="icon-placeholder">🎮</div>
                <h1>RPG Emulator</h1>
                <p>Selecciona la carpeta de tu juego RPG Maker MV/MZ</p>
            </div>
            
            <div class="upload-section">
                <label for="game-folder" class="upload-btn">
                    <span class="btn-text">Seleccionar Carpeta</span>
                    <span class="btn-icon">📁</span>
                </label>
                <!-- Ojo: webkitdirectory permite seleccionar carpetas y recibir todos sus archivos -->
                <input type="file" id="game-folder" webkitdirectory directory multiple>
                
                <p id="status-text" class="status">Esperando juego...</p>
            </div>
            
            <button id="start-btn" class="start-btn hidden" disabled>Iniciar Juego</button>
        </div>
    </div>

    <!-- Iframe donde se ejecutará el juego -->
    <iframe id="game-frame" class="hidden" allowfullscreen></iframe>

    <!-- Botón para cerrar el juego actual y volver al menú -->
    <button id="close-game-btn" class="hidden">✖</button>

    <script src="app.js"></script>
</body>
</html>
